<!DOCTYPE html>
<html>

<head>

<title>Confirm Booking</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

.container{
max-width:700px;
margin:auto;
padding:40px;
background:white;
margin-top:40px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#3f5683;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2f456b;
}

</style>

</head>

<body>

<div class="container">

<h1>Confirm Booking</h1>

<p><b>Venue:</b> {{ venue.name }}</p>
<p><b>Location:</b> {{ venue.location }}</p>   <!-- added location -->
<p><b>Date:</b> {{ date }}</p>
<p><b>Time:</b> {{ time_slot }}</p>

<form action="/book" method="post">

<input type="hidden" name="venue_id" value="{{ venue.id }}">
<input type="hidden" name="date" value="{{ date }}">
<input type="hidden" name="time_slot" value="{{ time_slot }}">

<button type="submit">Confirm Booking</button>

</form>

<br>

<a href="/">Cancel</a>

</div>

</body>
</html>
